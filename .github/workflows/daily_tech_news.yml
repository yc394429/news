name: 科技与AI资讯自动推送

on:
  schedule:
    # 每3小时运行一次（UTC时间）
    # UTC 23:00 = 北京时间 07:00（早间推送）
    # UTC 02:00 = 北京时间 10:00（上午推送）
    # UTC 05:00 = 北京时间 13:00（午间推送）
    # UTC 08:00 = 北京时间 16:00（下午推送）
    # UTC 11:00 = 北京时间 19:00（晚间推送）
    # UTC 14:00 = 北京时间 22:00（夜间推送）
    - cron: '0 23,2,5,8,11,14 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行抓取推送脚本
        env:
          SEND_KEY: ${{ secrets.SEND_KEY }}
        run: |
          python fetch_news.py
